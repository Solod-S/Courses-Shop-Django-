<!-- prettier-ignore -->
{% extends "base.html" %}
<!-- prettier-ignore -->
{% block title %}All Courses{% endblock title %}
<!-- prettier-ignore -->
{% block content %}
<div class="table-wrapper mt-5">
  <table>
    <thead>
      <tr>
        <th>Title</th>
        <th>Category</th>
        <th>Price</th>
        <th>Students Quantity</th>
        <th></th>
      </tr>
    </thead>
    <tbody>
      <!-- prettier-ignore -->
      {% for course in courses %}
      <tr>
        <td>{{course.title}}</td>
        <td>{{course.category}}</td>
        <td>${{course.price}}</td>
        <td>{{course.students_qty}}</td>
        <td><button>Buy</button></td>
      </tr>
      <!-- prettier-ignore -->
      {% endfor %}
    </tbody>
  </table>
</div>
<!-- prettier-ignore -->
{% endblock %}
